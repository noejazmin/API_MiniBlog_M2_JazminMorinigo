openapi: 3.0.3
info:
  title: API MiniBlog M2
  version: 1.0.0
  description: API REST con Node.js, Express y PostgreSQL para gestionar authors, posts y comments.
  contact:
    name: Jazmin Morinigo
    email: noejazminmrivas@gmail.com

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://apiminiblogm2jazminmorinigo-production.up.railway.app
    description: Servidor de Railway


tags:
  - name: Health
    description: Endpoints para verificar el estado del servidor
  - name: routes
    description: Endpoints para gestionar authors, posts y comments

paths:
  /health:
    get:
      summary: Verificar estado del servidor
      responses:
        "200":
          description: Servidor funcionando

  /authors:
    get:
      summary: Listar authors
      responses:
        "200":
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"
    post:
      summary: Crear author
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "201":
          description: Author creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos invalidos
        "409":
          description: Email duplicado

  /authors/{id}:
    get:
      summary: Obtener author por id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Id invalido
        "404":
          description: Author no encontrado
    put:
      summary: Actualizar author
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "200":
          description: Author actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos invalidos
        "404":
          description: Author no encontrado
        "409":
          description: Email duplicado
    delete:
      summary: Eliminar author
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Author eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Id invalido
        "404":
          description: Author no encontrado

  /posts:
    get:
      summary: Listar posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos invalidos
        "404":
          description: Author no encontrado

  /posts/{id}:
    get:
      summary: Obtener post por id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Id invalido
        "404":
          description: Post no encontrado
    put:
      summary: Actualizar post
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos invalidos
        "404":
          description: Post o author no encontrado
    delete:
      summary: Eliminar post
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Post eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Id invalido
        "404":
          description: Post no encontrado

  /posts/author/{authorId}:
    get:
      summary: Listar posts de un author con detalle del author
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostWithAuthor"
        "400":
          description: AuthorId invalido

  /comments:
    get:
      summary: Listar comments
      responses:
        "200":
          description: Lista de comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentWithDetails"
    post:
      summary: Crear comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          description: Datos invalidos
        "404":
          description: Post o author no encontrado

  /comments/post/{postId}:
    get:
      summary: Listar comments de un post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de comments del post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentWithDetails"
        "400":
          description: PostId invalido

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ana Garcia
        email:
          type: string
          example: ana@example.com
        bio:
          type: string
          nullable: true
          example: Autora de contenidos backend.

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Ana Garcia
        email:
          type: string
          example: ana@example.com
        bio:
          type: string
          example: Autora de contenidos backend.

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Introduccion a Node.js
        content:
          type: string
          example: Node.js permite ejecutar JavaScript en el servidor.
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T10:30:00Z

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          example: Introduccion a Node.js
        content:
          type: string
          example: Node.js permite ejecutar JavaScript en el servidor.
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true

    PostWithAuthor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Introduccion a Node.js
        content:
          type: string
          example: Node.js permite ejecutar JavaScript en el servidor.
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T10:30:00Z
        author_id:
          type: integer
          example: 1
        author_name:
          type: string
          example: Ana Garcia
        author_email:
          type: string
          example: ana@example.com
        author_bio:
          type: string
          nullable: true
          example: Autora de contenidos backend.

    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: Muy buen post.
        post_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T11:15:00Z

    CommentInput:
      type: object
      required:
        - content
        - post_id
        - author_id
      properties:
        content:
          type: string
          example: Muy buen post.
        post_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 1

    CommentWithDetails:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: Muy buen post.
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T11:15:00Z
        post_id:
          type: integer
          example: 1
        post_title:
          type: string
          example: Introduccion a Node.js
        author_id:
          type: integer
          example: 1
        author_name:
          type: string
          example: Ana Garcia
        author_email:
          type: string
          example: ana@example.com
