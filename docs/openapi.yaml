openapi: 3.1.1
info:
  title: API MiniBlog M2
  version: 1.0.0
  description: API REST con Node.js, Express y PostgreSQL para gestionar authors, posts y comments.
  contact:
    name: Jazmin Morinigo
    email: noejazminmrivas@gmail.com

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://apiminiblogm2jazminmorinigo-production.up.railway.app
    description: Servidor de Railway

tags:
  - name: Health
    description: Endpoints para verificar el estado de la API
  - name: Authors
    description: Operaciones CRUD de autores
  - name: Posts
    description: Operaciones CRUD de posts
  - name: Comments
    description: Operaciones para crear y listar comentarios

paths:
  /health:
    get:
      summary: Verificar estado del servidor
      tags:
        - Health
      responses:
        '200':
          description: Servidor funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Servidor funcionando

  /db-test:
    get:
      summary: Verificar conexion con PostgreSQL
      tags:
        - Health
      responses:
        '200':
          description: Conexion a PostgreSQL funcionando
        '500':
          $ref: '#/components/responses/InternalServerError'

  /authors:
    get:
      summary: Listar authors
      tags:
        - Authors
      responses:
        '200':
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Crear author
      tags:
        - Authors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
            example:
              name: Ana Garcia
              email: ana@example.com
              bio: Autora de contenidos backend.
      responses:
        '201':
          description: Author creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email duplicado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /authors/{id}:
    get:
      summary: Obtener author por id
      tags:
        - Authors
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          description: Author no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Actualizar author
      tags:
        - Authors
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
            example:
              name: Ana Garcia
              email: ana@example.com
              bio: Autora backend actualizada.
      responses:
        '200':
          description: Author actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Author no encontrado
        '409':
          description: Email duplicado
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Eliminar author
      tags:
        - Authors
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Author eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          description: Author no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts:
    get:
      summary: Listar posts
      tags:
        - Posts
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Crear post
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
            example:
              title: Introduccion a Node.js
              content: Node.js permite ejecutar JavaScript en el servidor.
              author_id: 1
              published: true
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Author no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts/{id}:
    get:
      summary: Obtener post por id
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          description: Post no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Actualizar post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
            example:
              title: Introduccion a Node.js actualizada
              content: Contenido actualizado del post.
              author_id: 1
              published: true
      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Post o author no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Eliminar post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Post eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          description: Post no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts/author/{authorId}:
    get:
      summary: Listar posts de un author
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      responses:
        '200':
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostWithAuthor'
        '400':
          $ref: '#/components/responses/InvalidId'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /comments:
    get:
      summary: Listar comments
      tags:
        - Comments
      responses:
        '200':
          description: Lista de comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentWithDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Crear comment
      tags:
        - Comments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'
            example:
              content: Muy buen post.
              post_id: 1
              author_id: 1
      responses:
        '201':
          description: Comment creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Post o author no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /comments/post/{postId}:
    get:
      summary: Listar comments de un post
      tags:
        - Comments
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Lista de comments del post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentWithDetails'
        '400':
          $ref: '#/components/responses/InvalidId'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: ID entero positivo
      schema:
        type: integer
        minimum: 1
      example: 1

    AuthorId:
      name: authorId
      in: path
      required: true
      description: ID entero positivo del author
      schema:
        type: integer
        minimum: 1
      example: 1

    PostId:
      name: postId
      in: path
      required: true
      description: ID entero positivo del post
      schema:
        type: integer
        minimum: 1
      example: 1

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        name:
          type: string
          maxLength: 100
          example: Ana Garcia
        email:
          type: string
          format: email
          maxLength: 150
          example: ana@example.com
        bio:
          type:
            - string
            - 'null'
          maxLength: 1000
          example: Autora de contenidos backend.
        created_at:
          type: string
          format: date-time
          example: 2026-05-19T12:15:22.424Z

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
          example: Ana Garcia
        email:
          type: string
          format: email
          maxLength: 150
          example: ana@example.com
        bio:
          type: string
          maxLength: 1000
          example: Autora de contenidos backend.

    Post:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        title:
          type: string
          maxLength: 200
          example: Introduccion a Node.js
        content:
          type: string
          maxLength: 10000
          example: Node.js permite ejecutar JavaScript en el servidor.
        author_id:
          type: integer
          minimum: 1
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2026-05-19T12:15:22.584Z

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          maxLength: 200
          example: Introduccion a Node.js
        content:
          type: string
          maxLength: 10000
          example: Node.js permite ejecutar JavaScript en el servidor.
        author_id:
          type: integer
          minimum: 1
          example: 1
        published:
          type: boolean
          example: true

    PostWithAuthor:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        title:
          type: string
          maxLength: 200
          example: Introduccion a Node.js
        content:
          type: string
          maxLength: 10000
          example: Node.js permite ejecutar JavaScript en el servidor.
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2026-05-19T12:15:22.584Z
        author_id:
          type: integer
          minimum: 1
          example: 1
        author_name:
          type: string
          maxLength: 100
          example: Ana Garcia
        author_email:
          type: string
          format: email
          maxLength: 150
          example: ana@example.com
        author_bio:
          type:
            - string
            - 'null'
          maxLength: 1000
          example: Autora de contenidos backend.

    Comment:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        content:
          type: string
          maxLength: 5000
          example: Muy buen post.
        post_id:
          type: integer
          minimum: 1
          example: 1
        author_id:
          type: integer
          minimum: 1
          example: 1
        created_at:
          type: string
          format: date-time
          example: 2026-05-19T12:20:00.000Z

    CommentInput:
      type: object
      required:
        - content
        - post_id
        - author_id
      properties:
        content:
          type: string
          maxLength: 5000
          example: Muy buen post.
        post_id:
          type: integer
          minimum: 1
          example: 1
        author_id:
          type: integer
          minimum: 1
          example: 1

    CommentWithDetails:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        content:
          type: string
          maxLength: 5000
          example: Muy buen post.
        created_at:
          type: string
          format: date-time
          example: 2026-05-19T12:20:00.000Z
        post_id:
          type: integer
          minimum: 1
          example: 1
        post_title:
          type: string
          maxLength: 200
          example: Introduccion a Node.js
        author_id:
          type: integer
          minimum: 1
          example: 1
        author_name:
          type: string
          maxLength: 100
          example: Ana Garcia
        author_email:
          type: string
          format: email
          maxLength: 150
          example: ana@example.com

    Error:
      type: object
      properties:
        message:
          type: string
          example: Recurso no encontrado
        error:
          type: string
          example: Error interno del servidor

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: El email es requerido

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: Datos invalidos
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

  responses:
    InvalidId:
      description: Parametro id invalido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      description: Datos invalidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
