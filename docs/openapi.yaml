openapi: 3.0.3
info:
  title: API MiniBlog M2
  version: 1.0.0
  description: API REST con Node.js, Express y PostgreSQL para gestionar authors, posts y comments.
  contact:
    name: Jazmin Morinigo
    email: noejazminmrivas@gmail.com

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://apiminiblogm2jazminmorinigo-production.up.railway.app
    description: Servidor de Railway


tags:
  - name: Health
    description: Endpoints para verificar el estado del servidor
  - name: routes
    description: Endpoints para gestionar authors, posts y comments

paths:
  /health:
    get:
      summary: Verificar estado del servidor
      responses:
        "200":
          description: Servidor funcionando

  /authors:
    get:
      summary: Listar authors
      responses:
        "200":
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"
    post:
      summary: Crear author
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "201":
          description: Author creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos invalidos
        "409":
          description: Email duplicado

  /authors/{id}:
    get:
      summary: Obtener author por id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Id invalido
        "404":
          description: Author no encontrado
    put:
      summary: Actualizar author
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "200":
          description: Author actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos invalidos
        "404":
          description: Author no encontrado
        "409":
          description: Email duplicado
    delete:
      summary: Eliminar author
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Author eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Id invalido
        "404":
          description: Author no encontrado

  /posts:
    get:
      summary: Listar posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos invalidos
        "404":
          description: Author no encontrado

  /posts/{id}:
    get:
      summary: Obtener post por id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Id invalido
        "404":
          description: Post no encontrado
    put:
      summary: Actualizar post
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos invalidos
        "404":
          description: Post o author no encontrado
    delete:
      summary: Eliminar post
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Post eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Id invalido
        "404":
          description: Post no encontrado

  /posts/author/{authorId}:
    get:
      summary: Listar posts de un author con detalle del author
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostWithAuthor"
        "400":
          description: AuthorId invalido

  /comments:
    get:
      summary: Listar comments
      responses:
        "200":
          description: Lista de comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentWithDetails"
    post:
      summary: Crear comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          description: Datos invalidos
        "404":
          description: Post o author no encontrado

  /comments/post/{postId}:
    get:
      summary: Listar comments de un post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de comments del post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentWithDetails"
        "400":
          description: PostId invalido

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Author:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 150
        bio:
          type: string
          maxLength: 1000

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 150
        bio:
          type: string
          maxLength: 1000

    Post:
      type: object
      required:
        - id
        - title
        - content
        - author_id
        - published
        - created_at
      properties:
        id:
          type: integer
          minimum: 1
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000
        author_id:
          type: integer
          minimum: 1
        published:
          type: boolean
        created_at:
          type: string
          format: date-time

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000
        author_id:
          type: integer
          minimum: 1
        published:
          type: boolean

    PostWithAuthor:
      type: object
      required:
        - id
        - title
        - content
        - published
        - created_at
        - author_id
        - author_name
        - author_email
      properties:
        id:
          type: integer
          minimum: 1
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000
        published:
          type: boolean
        created_at:
          type: string
          format: date-time
        author_id:
          type: integer
          minimum: 1
        author_name:
          type: string
          maxLength: 100
        author_email:
          type: string
          format: email
          maxLength: 150
        author_bio:
          type: string
          maxLength: 1000

    Comment:
      type: object
      required:
        - id
        - content
        - post_id
        - author_id
        - created_at
      properties:
        id:
          type: integer
          minimum: 1
        content:
          type: string
          maxLength: 5000
        post_id:
          type: integer
          minimum: 1
        author_id:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time

    CommentInput:
      type: object
      required:
        - content
        - post_id
        - author_id
      properties:
        content:
          type: string
          maxLength: 5000
        post_id:
          type: integer
          minimum: 1
        author_id:
          type: integer
          minimum: 1

    CommentWithDetails:
      type: object
      required:
        - id
        - content
        - created_at
        - post_id
        - post_title
        - author_id
        - author_name
        - author_email
      properties:
        id:
          type: integer
          minimum: 1
        content:
          type: string
          maxLength: 5000
        created_at:
          type: string
          format: date-time
        post_id:
          type: integer
          minimum: 1
        post_title:
          type: string
          maxLength: 200
        author_id:
          type: integer
          minimum: 1
        author_name:
          type: string
          maxLength: 100
        author_email:
          type: string
          format: email
          maxLength: 150
