openapi: 3.0.3
info:
  title: API MiniBlog M2
  version: 1.0.0
  description: API REST con Node.js, Express y PostgreSQL para gestionar authors, posts y comments.
  contact:
    name: Jazmin Morinigo
    email: noejazminmrivas@gmail.com

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://apiminiblogm2jazminmorinigo-production.up.railway.app
    description: Servidor de Railway


tags:
  - name: Health
    description: Endpoints para verificar el estado del servidor
  - name: routes
    description: Endpoints para gestionar authors, posts y comments

paths:
  /health:
    get:
      summary: Verificar estado del servidor
      responses:
        "200":
          description: Servidor funcionando

  /authors:
    get:
      summary: Listar authors
      responses:
        "200":
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"
    post:
      summary: Crear author
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "201":
          description: Author creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos invalidos
        "409":
          description: Email duplicado

  /authors/{id}:
    get:
      summary: Obtener author por id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Id invalido
        "404":
          description: Author no encontrado
    put:
      summary: Actualizar author
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "200":
          description: Author actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Datos invalidos
        "404":
          description: Author no encontrado
        "409":
          description: Email duplicado
    delete:
      summary: Eliminar author
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Author eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: Id invalido
        "404":
          description: Author no encontrado

  /posts:
    get:
      summary: Listar posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos invalidos
        "404":
          description: Author no encontrado

  /posts/{id}:
    get:
      summary: Obtener post por id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Id invalido
        "404":
          description: Post no encontrado
    put:
      summary: Actualizar post
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Datos invalidos
        "404":
          description: Post o author no encontrado
    delete:
      summary: Eliminar post
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Post eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Id invalido
        "404":
          description: Post no encontrado

  /posts/author/{authorId}:
    get:
      summary: Listar posts de un author con detalle del author
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostWithAuthor"
        "400":
          description: AuthorId invalido

  /comments:
    get:
      summary: Listar comments
      responses:
        "200":
          description: Lista de comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentWithDetails"
    post:
      summary: Crear comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          description: Datos invalidos
        "404":
          description: Post o author no encontrado

  /comments/post/{postId}:
    get:
      summary: Listar comments de un post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de comments del post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentWithDetails"
        "400":
          description: PostId invalido

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Ana Garcia
          description: Nombre del autor
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 150
          example: ana@example.com
          description: Email único del autor
        bio:
          type: string
          nullable: true
          maxLength: 1000
          example: Autora de contenidos backend.
          description: Biografía del autor

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Ana Garcia
          description: Nombre del autor (requerido)
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 150
          example: ana@example.com
          description: Email único del autor (requerido)
        bio:
          type: string
          maxLength: 1000
          example: Autora de contenidos backend.
          description: Biografía opcional del autor

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
          description: ID único del post
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Introduccion a Node.js
          description: Título del post
        content:
          type: string
          minLength: 1
          maxLength: 10000
          example: Node.js permite ejecutar JavaScript en el servidor.
          description: Contenido del post
        author_id:
          type: integer
          example: 1
          description: ID del autor del post
        published:
          type: boolean
          example: true
          description: Estado de publicación del post
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T10:30:00Z
          description: Fecha de creación del post

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Introduccion a Node.js
          description: Título del post (requerido)
        content:
          type: string
          minLength: 1
          maxLength: 10000
          example: Node.js permite ejecutar JavaScript en el servidor.
          description: Contenido del post (requerido)
        author_id:
          type: integer
          example: 1
          description: ID del autor del post (requerido)
        published:
          type: boolean
          example: true
          description: Estado de publicación del post (opcional)

    PostWithAuthor:
      type: object
      properties:
        id:
          type: integer
          example: 1
          description: ID único del post
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Introduccion a Node.js
          description: Título del post
        content:
          type: string
          minLength: 1
          maxLength: 10000
          example: Node.js permite ejecutar JavaScript en el servidor.
          description: Contenido del post
        published:
          type: boolean
          example: true
          description: Estado de publicación del post
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T10:30:00Z
          description: Fecha de creación del post
        author_id:
          type: integer
          example: 1
          description: ID del autor
        author_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Ana Garcia
          description: Nombre del autor
        author_email:
          type: string
          format: email
          minLength: 1
          maxLength: 150
          example: ana@example.com
          description: Email del autor
        author_bio:
          type: string
          nullable: true
          maxLength: 1000
          example: Autora de contenidos backend.
          description: Biografía del autor

    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
          description: ID único del comentario
        content:
          type: string
          minLength: 1
          maxLength: 5000
          example: Muy buen post.
          description: Contenido del comentario
        post_id:
          type: integer
          example: 1
          description: ID del post comentado
        author_id:
          type: integer
          example: 1
          description: ID del autor del comentario
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T11:15:00Z
          description: Fecha de creación del comentario

    CommentInput:
      type: object
      required:
        - content
        - post_id
        - author_id
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000
          example: Muy buen post.
          description: Contenido del comentario (requerido)
        post_id:
          type: integer
          example: 1
          description: ID del post a comentar (requerido)
        author_id:
          type: integer
          example: 1
          description: ID del autor del comentario (requerido)

    CommentWithDetails:
      type: object
      properties:
        id:
          type: integer
          example: 1
          description: ID único del comentario
        content:
          type: string
          minLength: 1
          maxLength: 5000
          example: Muy buen post.
          description: Contenido del comentario
        created_at:
          type: string
          format: date-time
          example: 2024-05-19T11:15:00Z
          description: Fecha de creación del comentario
        post_id:
          type: integer
          example: 1
          description: ID del post comentado
        post_title:
          type: string
          minLength: 1
          maxLength: 255
          example: Introduccion a Node.js
          description: Título del post comentado
        author_id:
          type: integer
          example: 1
          description: ID del autor del comentario
        author_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Ana Garcia
          description: Nombre del autor del comentario
        author_email:
          type: string
          format: email
          minLength: 1
          maxLength: 150
          example: ana@example.com
          description: Email del autor del comentario
